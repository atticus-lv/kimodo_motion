name: Blender Extension

on:
  workflow_dispatch:        # manual trigger
  push:
    tags:
      - "v*"               # release on version tags

permissions:
  contents: read

env:
  PYTHONUTF8: "1"
  BLENDER_VERSION: "5.0.0"
  BLENDER_SERIES: "5.0"

jobs:
  build:
    name: Test & build extension
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to publish a release on tag

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Blender
        uses: actions/cache@v4
        with:
          path: .cache/blender/blender-${{ env.BLENDER_VERSION }}-linux-x64
          key: blender-${{ runner.os }}-${{ env.BLENDER_VERSION }}-linux-x64

      - name: Download Blender
        run: |
          set -euo pipefail
          archive="blender-${BLENDER_VERSION}-linux-x64"
          blender_dir="${GITHUB_WORKSPACE}/.cache/blender/${archive}"
          if [ ! -x "${blender_dir}/blender" ]; then
            mkdir -p "${GITHUB_WORKSPACE}/.cache/blender"
            curl --fail --location --retry 3 \
              "https://download.blender.org/release/Blender${BLENDER_SERIES}/${archive}.tar.xz" \
              --output "${RUNNER_TEMP}/${archive}.tar.xz"
            tar -xf "${RUNNER_TEMP}/${archive}.tar.xz" -C "${GITHUB_WORKSPACE}/.cache/blender"
          fi
          echo "BLENDER_BIN=${blender_dir}/blender" >> "${GITHUB_ENV}"

      - name: Validate extension source
        run: '"${BLENDER_BIN}" --factory-startup --command extension validate "${GITHUB_WORKSPACE}"'

      - name: Run tests (Blender Python)
        run: '"${BLENDER_BIN}" --background --factory-startup --python "${GITHUB_WORKSPACE}/tests/run_tests.py"'

      - name: Build extension package
        env:
          PACKAGE_DIR: ${{ runner.temp }}/kimodo-dist
        run: |
          set -euo pipefail
          mkdir -p "${PACKAGE_DIR}"
          "${BLENDER_BIN}" --factory-startup --command extension build \
            --source-dir "${GITHUB_WORKSPACE}" --output-dir "${PACKAGE_DIR}"
          shopt -s nullglob
          packages=("${PACKAGE_DIR}"/kimodo_motion-*.zip)
          if [ "${#packages[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one extension zip, found ${#packages[@]}"
            exit 1
          fi
          "${BLENDER_BIN}" --factory-startup --command extension validate "${packages[0]}"
          echo "PACKAGE_PATH=${packages[0]}" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kimodo_motion-extension
          path: ${{ env.PACKAGE_PATH }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" > /dev/null 2>&1; then
            gh release upload "${tag}" "${PACKAGE_PATH}" --clobber
          else
            gh release create "${tag}" "${PACKAGE_PATH}" --title "${tag}" --generate-notes
          fi

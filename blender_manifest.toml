schema_version = "1.0.0"

id = "kimodo_motion"
version = "0.1.0"
name = "Kimodo Motion"
tagline = "NVIDIA Kimodo AI text-to-motion, retargeted to your rig"
maintainer = "Xingxun, Atticus"
type = "add-on"

website = "https://github.com/atticus-lv/kimodo_motion"

tags = ["Animation", "Rigging", "Pipeline"]

blender_version_min = "5.0.0"

# Plugin code is GPL-3.0-or-later (Blender add-on compatible). The runtime it
# installs (kimodo, PyTorch, Llama-3-8B weights) is fetched per-machine from its
# original sources and is NOT bundled — see README "License boundary".
license = ["SPDX:GPL-3.0-or-later"]

copyright = [
  "2026 Xingxun",
  "2026 Atticus",
]

[permissions]
network = "Download models and reach the local Kimodo inference server"
files = "Manage the runtime venv, model cache, and generated motion"

[build]
# Ship only the add-on; keep repo/dev/runtime files out of the extension zip.
paths_exclude_pattern = [
  "__pycache__/",
  ".*",
  "tests/",
  "docs/",
  "pyproject.toml",
  "*.zip",
  # Legacy FBX-SDK retarget path — superseded by retarget/bpy_retarget.py, kept in
  # the repo for reference but not shipped (nothing imports it at runtime).
  "retarget/fbx_bridge.py",
  "retarget/fbx_runner.py",
  "retarget/apply.py",
  "vendor/",
]
